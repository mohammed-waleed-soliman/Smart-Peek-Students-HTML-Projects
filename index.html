<!DOCTYPE html>
<html>
<head>
    <title>HTML Course Projects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        p {
            text-align: center;
            color: #666;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-top: 0;
            color: #222;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: #0078ff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .card a:hover {
            background: #005ecb;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 HTML Course Projects</h1>

        <p>
            A collection of websites created by students during the HTML course.
        </p>

        <div class="projects">

            <div class="card">
                <h3>Ibrahim Ahmed</h3>
                <p>Milky Way Galaxy</p>
                <a href="Ibrahim_Ahmed/">View Project</a>
            </div>

            <div class="card">
                <h3>Muddather Mohammed</h3>
                <p>Life Cycle Of Star</p>
                <a href="Muddather_Mohammed/">View Project</a>
            </div>

        </div>

        <footer>
            Created for the HTML Course © 2026
        </footer>
    </div>
</body>
</html>
